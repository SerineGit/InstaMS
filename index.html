<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmithMildredActress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ig-app">

  <div class="topbar">
    <div class="icons">
      <span id="add-post-btn" title="Добавить пост">➕</span>
      <span title="Меню">☰</span>
    </div>
  </div>

  <div class="profile-header">
    <div class="avatar" id="avatar-slot"></div>
    <div class="profile-main">
      <div class="username-row">
        <span class="username" id="profile-username">SmithMildredActress</span>
        <span id="profile-badge"></span>
      </div>
      <div class="stats">
        <div><b id="stat-posts">0</b> posts</div>
        <div><b id="stat-followers">102</b> followers</div>
        <div><b id="stat-following">162</b> following</div>
      </div>
      <div class="bio">
        <span class="name" id="profile-fullname">Mildred Smith</span><br>
        <span class="dim" id="profile-bio">Actress · заглушка описания профиля</span>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn" id="edit-profile-btn">Edit profile</button>
    <button class="btn">Share profile</button>
    <button class="btn icon-btn">👤+</button>
  </div>

  <div class="tabs">
    <div class="tab active">▦</div>
    <div class="tab">▷</div>
    <div class="tab">🔁</div>
    <div class="tab">👤</div>
  </div>

  <div class="grid" id="grid"></div>

  <!-- модалка просмотра поста -->
  <div class="modal-backdrop" id="viewModalBackdrop">
    <button class="close-btn" id="viewCloseBtn">×</button>
    <div class="modal">
      <div class="modal-media" id="viewModalMedia"></div>
      <div class="modal-side">
        <div class="modal-side-header">
          <div class="avatar-sm"></div>
          <div class="uname">SmithMildredActress</div>
          <button class="post-edit-btn" id="viewEditBtn" title="Редактировать">✏️</button>
          <button class="post-delete-btn" id="viewDeleteBtn" title="Удалить">✕</button>
        </div>
        <div class="modal-caption" id="viewModalCaption"></div>
        <div class="modal-actions">
          <span>♡</span>
          <span>💬</span>
          <span>➤</span>
        </div>
        <div class="modal-likes" id="viewModalLikes"></div>
        <div class="modal-time" id="viewModalTime"></div>
      </div>
    </div>
  </div>

  <!-- модалка добавления / редактирования поста -->
  <div class="form-modal" id="postFormModal">
    <div class="modal-backdrop-shared" id="postFormBackdrop"></div>
    <div class="form-panel">
      <button class="bio-modal-close" id="postFormCloseBtn">✕</button>
      <div class="form-title" id="pf-heading">Новый пост</div>
      <div class="form-group">
        <label class="form-label">Ссылка на картинку</label>
        <input class="form-input" id="pf-image" type="text" placeholder="https://i.imgur.com/…">
        <div id="pf-image-preview"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Подпись</label>
        <textarea class="form-textarea" id="pf-caption" placeholder="Текст поста…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Лайки</label><input class="form-input" id="pf-likes" type="number" placeholder="12"></div>
        <div class="form-group"><label class="form-label">Когда</label><input class="form-input" id="pf-time" placeholder="2 hours ago"></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="pf-cancel">Отмена</button>
        <button class="btn-submit" id="pf-submit">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- модалка редактирования профиля -->
  <div class="form-modal" id="profileFormModal">
    <div class="modal-backdrop-shared" id="profileFormBackdrop"></div>
    <div class="form-panel">
      <button class="bio-modal-close" id="profileFormCloseBtn">✕</button>
      <div class="form-title">Редактировать профиль</div>
      <div class="form-group">
        <label class="form-label">Ссылка на аватарку</label>
        <input class="form-input" id="pfl-avatar" type="text" placeholder="https://i.imgur.com/…">
        <div id="pfl-avatar-preview"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Ник (username)</label>
        <input class="form-input" id="pfl-username" type="text" placeholder="SmithMildredActress">
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" id="pfl-verified" style="width:auto;margin-right:6px;">
          Официальный аккаунт (синяя галочка)
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Полное имя</label>
        <input class="form-input" id="pfl-fullname" type="text" placeholder="Mildred Smith">
      </div>
      <div class="form-group">
        <label class="form-label">Описание (био)</label>
        <textarea class="form-textarea" id="pfl-bio" placeholder="Actress · …"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Followers</label><input class="form-input" id="pfl-followers" type="number" placeholder="102"></div>
        <div class="form-group"><label class="form-label">Following</label><input class="form-input" id="pfl-following" type="number" placeholder="162"></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="pfl-cancel">Отмена</button>
        <button class="btn-submit" id="pfl-submit">Сохранить</button>
      </div>
    </div>
  </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
